<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Background rounded square -->
  <rect width="500" height="500" rx="60" ry="60" fill="#009999"/>

  <!-- Device body -->
  <rect x="100" y="100" width="300" height="260" rx="18" ry="18" fill="#ffffff" opacity="0.95"/>
  <rect x="100" y="100" width="300" height="50" rx="18" ry="18" fill="#006666"/>
  <rect x="100" y="128" width="300" height="22" fill="#006666"/>

  <!-- Header text: SENTRON -->
  <text x="250" y="133" font-family="Arial, sans-serif" font-size="22" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="3">SENTRON</text>

  <!-- PAC label -->
  <text x="145" y="185" font-family="Arial, sans-serif" font-size="13" fill="#444" font-weight="600">PAC2200</text>

  <!-- Large power reading display -->
  <rect x="120" y="195" width="260" height="60" rx="6" fill="#e8f5f5" stroke="#009999" stroke-width="1.5"/>
  <text x="250" y="238" font-family="'Courier New', monospace" font-size="32" font-weight="bold"
        fill="#006666" text-anchor="middle">12.4 kW</text>

  <!-- Three phase mini bars -->
  <text x="130" y="280" font-family="Arial, sans-serif" font-size="11" fill="#666">L1</text>
  <rect x="145" y="268" width="60" height="12" rx="3" fill="#e0e0e0"/>
  <rect x="145" y="268" width="46" height="12" rx="3" fill="#009999"/>

  <text x="218" y="280" font-family="Arial, sans-serif" font-size="11" fill="#666">L2</text>
  <rect x="233" y="268" width="60" height="12" rx="3" fill="#e0e0e0"/>
  <rect x="233" y="268" width="52" height="12" rx="3" fill="#009999"/>

  <text x="306" y="280" font-family="Arial, sans-serif" font-size="11" fill="#666">L3</text>
  <rect x="321" y="268" width="60" height="12" rx="3" fill="#e0e0e0"/>
  <rect x="321" y="268" width="48" height="12" rx="3" fill="#009999"/>

  <!-- Bottom metrics row -->
  <line x1="120" y1="295" x2="380" y2="295" stroke="#ddd" stroke-width="1"/>
  <text x="165" y="315" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">230.1 V</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">17.9 A</text>
  <text x="335" y="315" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">50.0 Hz</text>

  <text x="165" y="330" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle">Voltage</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle">Current</text>
  <text x="335" y="330" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle">Frequency</text>

  <!-- Status LED -->
  <circle cx="370" cy="168" r="7" fill="#00dd44"/>
  <circle cx="370" cy="168" r="4" fill="#00ff55" opacity="0.6"/>

  <!-- Bottom Siemens wordmark area -->
  <text x="250" y="430" font-family="Arial, sans-serif" font-size="26" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="2">Siemens</text>
  <text x="250" y="458" font-family="Arial, sans-serif" font-size="12"
        fill="#cceeee" text-anchor="middle" letter-spacing="1">Power Monitoring</text>
</svg>
